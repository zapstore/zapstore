name: installed_apps_plugin
description: Registers Zapstore's Android package manager with every Flutter engine.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: dev.zapstore.app.plugins.registration
        pluginClass: AndroidPackageManagerRegistrantPlugin
